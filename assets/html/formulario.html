<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NEON VAULT - Registro</title>

    <link rel="stylesheet" href="../css/bootstrap.min.css">

</head>

<body class="bg-dark text-light">


    <!-- HEADER -->
    <header>

        <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary sticky-top">

            <div class="container">

                <a class="navbar-brand fw-bold text-info" href="#">
                    NEON VAULT
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarContent">

                    <span class="navbar-toggler-icon"></span>

                </button>

                <div class="collapse navbar-collapse" id="navbarContent">

                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">

                        <li class="nav-item">
                            <a class="nav-link" href="../../index.html">
                                Inicio
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="Juegos.html">
                                Juegos
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link active" href="#register">
                                Registro
                            </a>
                        </li>

                    </ul>


                </div>

            </div>

        </nav>

    </header>


    <!-- MAIN -->
    <main class="container-fluid min-vh-100 d-flex justify-content-center align-items-center py-5">

        <div class="row justify-content-center w-100">

            <div class="col-11 col-sm-10 col-md-8 col-lg-5">

                <div class="card bg-dark border-secondary shadow-lg text-light">

                    <div class="card-body p-4 p-lg-5" id="register">

                        <div class="mb-4">

                            <h1 class="fw-bold mb-2">
                                Crear Cuenta
                            </h1>

                            <p class="text-secondary">
                                Ingresa tus datos para unirte a la bóveda.
                            </p>

                        </div>

                        <form>

                            <div class="mb-4">

                                <label class="form-label text-uppercase small text-secondary">
                                    Usuario
                                </label>

                                <input type="text"
                                    class="form-control bg-black border-secondary text-light"
                                    placeholder="cyber_runner_2077">

                            </div>

                            <div class="mb-4">

                                <label class="form-label text-uppercase small text-secondary">
                                    Correo Electrónico
                                </label>

                                <input type="email"
                                    class="form-control bg-black border-secondary text-light"
                                    placeholder="usuario@neonvault.com">

                            </div>

                            <div class="mb-4">

                                <label class="form-label text-uppercase small text-secondary">
                                    Género Favorito
                                </label>

                                <select class="form-select bg-black border-secondary text-light">

                                    <option selected disabled>
                                        Selecciona una opción...
                                    </option>

                                    <option>
                                        RPG Cyberpunk
                                    </option>

                                    <option>
                                        Shooter Táctico
                                    </option>

                                    <option>
                                        Simulación Digital
                                    </option>

                                    <option>
                                        Estrategia
                                    </option>

                                    <option>
                                        Techno Horror
                                    </option>

                                </select>

                            </div>

                            <div class="d-grid mb-3">

                                <button type="submit" class="btn btn-primary btn-lg">

                                    Crear Cuenta

                                </button>

                            </div>

                            <div class="text-center">

                                <p class="text-secondary mb-0">

                                    ¿Ya tienes cuenta?

                                    <a href="#" class="text-info text-decoration-none">
                                        Inicia sesión aquí
                                    </a>

                                </p>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </main>


    <!-- FOOTER -->
    <footer class="footer-custom">

        <div class="container">

            <div class="row">

                <div class="col-md-4 mb-4">

                    <h4 class="logo-text">
                        NEON VAULT
                    </h4>

                    <p>
                        El repositorio digital de videojuegos de nueva generación.
                    </p>

                </div>

                <div class="col-md-4 mb-4">

                    <h5>
                        Contacto
                    </h5>

                    <p>
                        soporte@neonvault.com
                    </p>

                </div>

            </div>

            <hr>

            <div class="text-center">

                © 2026 NEON VAULT - Todos los derechos reservados

            </div>

        </div>

    </footer>


</body>

</html>
